<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <title>Paulo Limeira</title>
  </head>
  <body>
    <section class="container">
      <header>
        <img
          class="profile-picture"
          src="img/perfil.png"

      <ul class="list">
        <li class="list-item">
          <a class="link" href="" target="_blank"
            >Instagram<img

              src="img/instagram.png"
              alt="instagram"
            />
          </a>
        </li>
        <li class="list-item">
          <a class="link" href="" target="_blank"
            >Linkedin<img class="li-icon" src="img/linkedin.png" alt="Linkedin"
          /></a>
        </li>
        <li class="list-item">
          <a class="link" href="" target="_blank"
            >GitHub<img class="li-icon" src="img/github.png" alt="github"
          /></a>
        </li>
      </ul>
      <footer>
        <a href="" class="contact"
          ><img class="icon-contact" src="img/e-mail.png" alt="email"
        /></a>
        <a href="" class="contact"
          ><img class="icon-contact" src="img/whatsapp.png" alt="whatsapp"
        /></a>
        <a href="" class="contact"
          ><img class="icon-contact" src="img/site.png" alt="site"
        /></a>
